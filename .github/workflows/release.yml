name: Release

# Triggered only after the CI workflow on the same `main` push completes
# successfully — prevents publishing a green changeset on top of a red build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# `id-token: write` enables npm provenance via OIDC.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: changeset version + publish
    runs-on: ubuntu-latest
    # Only publish from the canonical atelier-oss repo; staging mirrors
    # (7alexhale5-rgb/atelier and any forks) skip the publish step so
    # they don't generate failed provenance attempts in the sigstore log.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success'
          && github.repository == 'atelier-oss/atelier' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can compute the version range.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        # version is read from package.json `packageManager` field

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Publish to npm
        # Direct pnpm publish -r — bypasses changesets/action which no-ops
        # when changesets are already consumed locally. --no-git-checks lets
        # the workflow publish from a clean main without the changeset gate.
        # --provenance signs each tarball via OIDC (id-token: write).
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          # setup-node@v4 with registry-url writes ~/.npmrc referencing
          # ${NODE_AUTH_TOKEN} for the registry auth.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
