name: Release

# Triggered only after the CI workflow on the same `main` push completes
# successfully — prevents publishing a green changeset on top of a red build.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# `id-token: write` enables npm provenance via OIDC.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: changeset version + publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can compute the version range.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
