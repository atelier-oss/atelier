# 60-case ground-truth fixture for @atelier/classify.
#
# Each case: {input, kind?, expected, rationale}
#   kind:     "class"  (default) — classify_class(input)
#             "inline"           — extract_inline_colors(input) → raw if any, else none
#   expected: "token" | "raw" | "none"
#
# Both Python (benchmarks/score.py) and TS (@atelier/classify) MUST agree on
# every row. parity_check.py validates the Python side. classify.test.ts
# validates the TS side. Phase 2.1 ships when both pass 60/60.

# --- Tailwind palette → RAW (12) ---
- input: "bg-zinc-900"
  expected: raw
  rationale: "Tailwind zinc palette"
- input: "bg-zinc-50"
  expected: raw
  rationale: "Tailwind zinc palette"
- input: "text-slate-500"
  expected: raw
  rationale: "Tailwind slate palette"
- input: "border-gray-200"
  expected: raw
  rationale: "Tailwind gray palette"
- input: "ring-emerald-500"
  expected: raw
  rationale: "Tailwind emerald palette"
- input: "bg-blue-500/50"
  expected: raw
  rationale: "Tailwind palette with opacity modifier"
- input: "bg-red-400"
  expected: raw
  rationale: "Tailwind red palette"
- input: "shadow-purple-500"
  expected: raw
  rationale: "Tailwind palette on shadow prefix"
- input: "fill-cyan-300"
  expected: raw
  rationale: "Tailwind palette on fill prefix"
- input: "stroke-rose-600"
  expected: raw
  rationale: "Tailwind rose palette on stroke"
- input: "from-violet-700"
  expected: raw
  rationale: "Tailwind palette on gradient from"
- input: "to-pink-200/40"
  expected: raw
  rationale: "Tailwind palette gradient with opacity"

