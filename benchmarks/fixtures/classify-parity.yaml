# --- Arbitrary value with var() → TOKEN (5) ---
- input: "bg-[hsl(var(--pf))]"
  expected: token
  rationale: "var() reference inside arbitrary"
- input: "text-[hsl(var(--ring))]"
  expected: token
  rationale: "var() reference"
- input: "border-[var(--border)]"
  expected: token
  rationale: "raw var() reference"
- input: "ring-[hsl(var(--primary)/0.5)]"
  expected: token
  rationale: "var() with opacity in arbitrary"
- input: "bg-[color:var(--accent)]"
  expected: token
  rationale: "color: prefix on var() inside arbitrary"

