# --- Inline color literals (kind=inline) → raw / none (6) ---
- input: "color: #1A7BA5"
  kind: inline
  expected: raw
  rationale: "inline hex literal"
- input: "background: rgba(0,0,0,0.5)"
  kind: inline
  expected: raw
  rationale: "inline rgba literal"
- input: "fill: hsl(214, 100%, 16%)"
  kind: inline
  expected: raw
  rationale: "inline hsl literal"
- input: "boxShadow: '0 1px 3px rgb(0 0 0 / 0.1)'"
  kind: inline
  expected: raw
  rationale: "inline rgb literal with modern syntax"
- input: "borderColor: hsla(195, 72%, 55%, 0.4)"
  kind: inline
  expected: raw
  rationale: "inline hsla literal"
- input: "no color literal here"
  kind: inline
  expected: none
  rationale: "no inline color literal"

# --- Edge cases (5) ---
- input: "bg-zinc-800/50"
  expected: raw
  rationale: "palette with opacity modifier still raw"
- input: "ring-foreground/20"
  expected: token
  rationale: "semantic with opacity still token"
- input: "text-emerald"
  expected: raw
  rationale: "palette name with no shade defaults to raw"
- input: "bg-"
  expected: none
  rationale: "prefix without value — not classifiable"
- input: ""
  expected: none
  rationale: "empty string"
